<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script type="text/Javascript">
        function add() {
            var total;
            var first=parseFloat(document.getElementById("text1").value);
             var second=parseFloat(document.getElementById("text2").value);
             total = first+second;
             alert('the total is '+total);
        }
        function add1() {
            var total;
            var first = parseFloat(document.getElementsByName("first")[0].value);
            var second = parseFloat(document.getElementsByName("second")[0].value);
            total = first + second;
            alert('the total is' + total);

        }
    </script>
    <pre>
        1st Number : <input type="text" name="first" id="text1" placeholder="enter 1st number">
        2nd Number : <input type="text" name="second" id="text2" placeholder="enter 2nd number">

        <input type="button" value="sum" onclick="add1()"/>
    </pre>
</body>
</html>
